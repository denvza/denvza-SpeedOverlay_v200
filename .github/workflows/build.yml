name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O gradle.zip
          unzip -q gradle.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-8.6/bin" >> $GITHUB_PATH

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Find project root and build APK
        run: |
          echo "=== Repo contents ==="
          find . -maxdepth 4 \( -name "settings.gradle" -o -name "build.gradle" \) | sort

          # Find the directory that contains settings.gradle
          SETTINGS=$(find . -name "settings.gradle" | head -1)
          if [ -z "$SETTINGS" ]; then
            echo "ERROR: settings.gradle not found anywhere!"
            exit 1
          fi

          PROJECT_DIR=$(dirname "$SETTINGS")
          echo "=== Building project at: $PROJECT_DIR ==="

          gradle assembleDebug \
            --project-dir "$PROJECT_DIR" \
            --no-daemon \
            --stacktrace

      - name: Find and copy APK
        run: |
          APK=$(find . -name "app-debug.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" SpeedOverlay.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpeedOverlay
          path: SpeedOverlay.apk
          retention-days: 30
